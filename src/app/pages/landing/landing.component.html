<div class="page">

  <!-- Ambient glows -->
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="glow glow-3"></div>

  <!-- Navbar -->
  <nav class="nav">
    <div class="logo">
      <div class="logo-icon">♪</div>
      <span>BooneTunes</span>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-left">

      <div class="badge">
        <span class="badge-dot"></span>
        Stream music videos instantly
      </div>

      <h1>
        Turn <span class="gt-blue">your</span>
        <span class="gt-blue"> Spotify</span>
        playlists
        <br>
        <span class="gt-teal">into</span>
        music <span class="gt-teal">videos</span>.
      </h1>

      <p class="sub">
        Connect your Spotify account and watch your favorite tracks come
        to life with matching YouTube music videos.
        All your playlists, reimagined.
      </p>

      <div class="actions">
        <button class="btn-grad btn-connect" (click)="connect()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
          </svg>
          Connect with Spotify
        </button>
        <button class="btn-out btn-demo">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Watch Demo
        </button>
      </div>

    </div>

    <div class="hero-right">
      <div class="player-mock">
        <div class="mock-screen">
          <div class="mock-screen-inner"></div>
          <div class="mock-screen-overlay"></div>
        </div>
        <div class="mock-info">
          <div class="mock-track">
            <div class="mock-art"></div>
            <div class="mock-lines">
              <div class="mock-line mock-line-long"></div>
              <div class="mock-line mock-line-short"></div>
            </div>
          </div>
          <div class="mock-progress">
            <div class="mock-progress-fill"></div>
          </div>
          <div class="mock-dots">
            <div class="mock-dot"></div>
            <div class="mock-dot"></div>
            <div class="mock-dot mock-dot-active"></div>
            <div class="mock-dot"></div>
            <div class="mock-dot"></div>
            <div class="mock-dot-line"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Bottom feature badges -->
  <div class="feature-strip">
    <div class="feat">
      <div class="feat-icon feat-blue">♪</div>
    </div>
    <div class="feat">
      <div class="feat-icon feat-teal">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        </svg>
      </div>
    </div>
    <div class="feat">
      <div class="feat-icon feat-purple">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </div>
    </div>
  </div>

</div>
