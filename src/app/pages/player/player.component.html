<div class="page">

  <!-- Top bar -->
  <div class="topbar">
    <button class="btn-back" (click)="goBack()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Library
    </button>

    @if (currentItem) {
      <div class="now-playing-pill">
        <span class="pill-dot"></span>
        Now Playing — {{ currentItem.track.name }}
      </div>
    }
  </div>

  <!-- Main layout: video + sidebar -->
  <div class="player-layout">

    <!-- Left: video area + controls -->
    <div class="video-area">

      <!-- Video screen -->
      <div class="video-screen">

        <!--
          Sentinel div: AppComponent positions the persistent YouTube iframe
          to exactly cover this element via getBoundingClientRect + rAF.
        -->
        <div #videoSlot class="video-slot"></div>

        @if (index < 0) {
          <div class="video-empty">
            <span class="video-empty-icon">♪</span>
            <p>No track playing</p>
          </div>
        }

        <!-- Overlay blocks YouTube's native hover UI -->
        <div class="yt-overlay"></div>

        <!-- Loading indicator shown on top while fetching a new video -->
        @if (loadingVideo) {
          <div class="video-loading">
            <div class="spinner"></div>
            <p>Finding music video…</p>
          </div>
        }
      </div>

      <!-- Video alternatives row -->
      @if (videos.length > 1) {
        <div class="alts-bar">
          <span class="alts-label">Switch video</span>
          <div class="alts-list">
            @for (v of videos; track v.videoId) {
              <button
                class="alt-btn"
                [class.alt-active]="v.videoId === currentVideoId"
                (click)="selectVideo(v)"
                [title]="v.title"
              >
                @if (v.thumbnail) {
                  <img [src]="v.thumbnail" [alt]="v.title" />
                } @else {
                  <span class="alt-placeholder">▶</span>
                }
                @if (v.videoId === currentVideoId) {
                  <span class="alt-dot"></span>
                }
              </button>
            }
          </div>
        </div>
      }

      <!-- Controls bar -->
      <div class="controls-bar">
        <app-player-controls
          [isPlaying]="isPlaying"
          [isShuffle]="isShuffle"
          [isRepeat]="isRepeat"
          [progress]="progress"
          [volume]="volume"
          [currentTime]="currentTimeStr"
          [totalTime]="totalTimeStr"
          [trackName]="currentItem?.track?.name ?? ''"
          [artistName]="currentItem?.track?.artists?.join(' · ') ?? ''"
          [albumArtUrl]="currentItem?.track?.albumArtUrl ?? null"
          [hasAlternatives]="videos.length > 1"
          (togglePlay)="playerSvc.togglePlay()"
          (prev)="playerSvc.previous()"
          (next)="playerSvc.next()"
          (toggleShuffle)="playerSvc.toggleShuffle()"
          (toggleRepeat)="playerSvc.toggleRepeat()"
          (seekTo)="onSeekTo($event)"
          (volumeChange)="onVolumeChange($event)"
          (changeVideo)="playerSvc.fetchVideos()"
          (addToPlaylist)="onAddToPlaylist()"
        ></app-player-controls>
      </div>
    </div>

    <!-- Right: queue sidebar -->
    <app-queue-sidebar
      [queue]="queue"
      [currentIndex]="index"
      (playAtIndex)="playerSvc.playAtIndex($event)"
      (clearQueue)="playerSvc.clearQueue()"
      (removeAtIndex)="playerSvc.removeFromQueue($event)"
      (reorderQueue)="playerSvc.reorderQueue($event.from, $event.to)"
    ></app-queue-sidebar>

  </div>
</div>
